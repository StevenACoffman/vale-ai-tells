---
extends: existence
message: "AI figurative anchor: '%s'. Name what actually grounds it, or disable this rule when the anchor is literal."
level: warning
nonword: true
ignorecase: true
# "Anchor" used figuratively, meaning to ground or center an abstraction:
# "anchored in our values," "anchor the strategy," "an emotional anchor." This
# lives in the experimental package because anchor is heavily homographic. The
# literal senses are common and a regex can't always separate them: the HTML
# anchor tag and links, a news anchor, a ship's anchor, an anchor tenant, the
# anchoring bias. The exemptions cover the physical objects something literally
# anchors to (a wall, the seabed); the rest leans on the figurative shape, and a
# writer in a maritime, broadcast, or HTML context disables the rule.
exceptions:
  - "(?i)walls?"
  - "(?i)floors?"
  - "(?i)ceilings?"
  - "(?i)seabed"
  - "(?i)seafloor"
  - "(?i)(?:harbor|harbour)s?"
  - "(?i)bays?"
  - "(?i)docks?"
  - "(?i)piers?"
  - "(?i)hulls?"
  - "(?i)decks?"
  - "(?i)concrete"
  - "(?i)studs?"
  - "(?i)joists?"
  - "(?i)bolts?"
  - "(?i)chains?"
  - "(?i)posts?"
  - "(?i)stakes?"
  - "(?i)moorings?"
  - "(?i)brackets?"
  - "(?i)beams?"
  - "(?i)foundations?"
  - "(?i)pilings?"
  - "(?i)anchorage"
tokens:
  # "anchored in/to [abstraction]" — the core figurative shape. Literal anchoring
  # objects (a wall, the seabed) land in the captured window and are exempted.
  - "\\banchored (?:in|to)(?: \\w+){1,4}"
  # "anchor the [abstract object]"
  - "\\banchor(?:s|ed|ing)? (?:the |a |an |our |your |their |this |its )?(?:\\w+ )?(?:strategy|strategies|visions?|arguments?|narratives?|approach(?:es)?|frameworks?|discussions?|thesis|theses|conversations?|decisions?|brands?|identity|identities|missions?|philosophy|philosophies|worldviews?|values?|principles?|messaging|stories|story|essays?|roadmaps?|plans?|goals?|initiatives?|efforts?|agendas?|priority|priorities)\\b"
  # figurative noun anchor
  - "\\b(?:emotional|narrative|thematic|conceptual|moral|cultural|psychological|spiritual|philosophical|guiding|steadying) anchor\\b"
  # "serves/acts as an anchor"
  - "\\b(?:serves?|serving|served|acts?|acting|acted) as an anchor\\b"
