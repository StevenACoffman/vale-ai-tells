---
extends: existence
message: "AI overused verb: '%s'. Name the literal action: is merged or is routed to."
level: error
nonword: true
ignorecase: true
# "Lands" is an AI overuse fingerprint: a request "lands on" a node, a PR
# "lands in" main, an idea "lands in" a sweet spot. Flag the figurative arrival
# verb and exempt only things that quite literally land. Exemptions need (?i)
# because ignorecase covers tokens but not exemptions, so a sentence-initial
# "Snow lands on the sill" would otherwise leak through. Each exemption matches
# the subject word inside the captured "<subject> lands on" span.
exceptions:
  # Aircraft and flight
  - "(?i)planes?"
  - "(?i)airplanes?"
  - "(?i)aeroplanes?"
  - "(?i)jets?"
  - "(?i)jetliners?"
  - "(?i)airliners?"
  - "(?i)aircraft"
  - "(?i)helicopters?"
