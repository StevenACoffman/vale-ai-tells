---
extends: existence
message: "AI emphasis: '%s'. Remove the italics. Emphasizing a copula rarely adds meaning."
level: error
nonword: true
scope: raw
tokens:
  # Markdown italicized copula/filler words - the "manufactured profundity" pattern.
  # The (^|[^*]) ... ([^*]|$) guards keep matches to SINGLE-asterisk italics, so
  # bold (a doubled asterisk, e.g. a bolded word) does not trip the rule through its
  # inner run. RE2 has no lookbehind, so the guard consumes one neighboring
  # non-asterisk character.
  - "(^|[^*])\\*(?:is|are|was|were|the|and|not|or)\\*([^*]|$)"

  # Underscore italics. The leading space keeps a doubled underscore (bold, dunder)
  # clean: it never presents as " _word_".
  - " _is_"
  - " _are_"
  - " _was_"
  - " _were_"
  - " _the_"
  - " _and_"
  - " _not_"
  - " _or_"
