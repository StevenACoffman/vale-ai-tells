---
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build packages
        run: scripts/build-packages.sh dist

      - name: Extract release notes from CHANGELOG
        run: |
          scripts/extract-release-notes.sh "${GITHUB_REF#refs/tags/}" release-notes.md
          echo "--- release-notes.md ---"
          cat release-notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ai-tells.zip
            dist/ai-tells-commits.zip
            dist/ai-tells-experimental.zip
          body_path: release-notes.md
          generate_release_notes: true
